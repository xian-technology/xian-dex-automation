name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Validate release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          expected = os.environ["RELEASE_TAG"].removeprefix("v")
          actual = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          if actual != expected:
              raise SystemExit(f"release tag {expected} does not match project version {actual}")
          PY

      - name: Validate service
        run: |
          uv sync --no-sources --frozen --extra dev
          uv run --no-sources --extra dev ruff check .
          uv run --no-sources --extra dev pytest
          uv run --no-sources --extra dev python -m compileall src tests

      - name: Assemble complete source release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          mkdir -p release-dist
          tar -czf "release-dist/xian-dex-automation-${version}.tar.gz" \
            README.md LICENSE pyproject.toml uv.lock config.example.yaml \
            src contracts scripts docs
          cd release-dist
          sha256sum -- ./*.tar.gz > SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "xian-dex-automation ${GITHUB_REF_NAME#v}" \
            --generate-notes
