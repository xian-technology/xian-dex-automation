network:
  rpc_url: "http://127.0.0.1:26657"
  chain_id: null
  watcher_mode: "auto"
  poll_interval_seconds: 1.0

dex:
  router_contract: "con_dex"
  pairs_contract: "con_pairs"

wallet:
  private_key_env: "XIAN_DEX_AUTOMATION_PRIVATE_KEY"
  private_key_file: null
  private_key_file_env: "XIAN_DEX_AUTOMATION_PRIVATE_KEY_FILE"
  execute: false
  recipient: null

# direct_wallet submits directly to con_dex. For on-chain custody, switch to
# strategy_vault and configure the exact immutable/tightening-only envelope
# used to deploy contracts/con_dex_strategy_vault.py. Rules are rejected when
# they exceed this local copy of the on-chain limits.
custody:
  mode: "direct_wallet"
  strategy_vault: null

# Strategy-vault example:
# custody:
#   mode: "strategy_vault"
#   strategy_vault:
#     contract: "con_my_dex_strategy"
#     keeper_address: "<64-character automation wallet public key>"
#     pair_id: 1
#     src: "currency"
#     token_out: "con_token"
#     max_trade_size: "5"
#     total_spend_cap: "100"
#     max_slippage_bps: 100
#     cooldown_seconds: 300
#     max_deadline_seconds: 300

database_path: "state/xian-dex-automation.sqlite3"

rules:
  - id: "demo-price-move"
    enabled: true
    trigger:
      type: "price_move"
      pair_id: 1
      direction: "either"
      threshold_bps: 100
      cooldown_seconds: 300
    action:
      type: "swap_exact_in"
      src: "currency"
      amount_in: "1"
      max_slippage_bps: 100
      deadline_seconds: 300
